    // FUNGSI 1: Mengubah pilihan dropdown ampul berdasarkan jenis obat
function updateAmpul() {
    const jenisObat = document.getElementById('obat').value;
    const selectAmpul = document.getElementById('jml_ampul');
    
    // Kosongkan pilihan ampul sebelumnya
    selectAmpul.innerHTML = '<option value="">-- Pilih Jumlah Ampul --</option>';

    let pilihan = [];
    if (jenisObat === "epinefrin") {
        pilihan = [1, 2, 3, 4, 5, 6];
    } else if (jenisObat === "norepinefrin") {
        pilihan = [1, 2, 3];
    } else if (jenisObat === "dobutamin" || jenisObat === "dopamin") {
        pilihan = [1];
    }

    // Masukkan pilihan ke dalam dropdown
    pilihan.forEach(jml => {
        let opt = document.createElement('option');
        opt.value = jml;
        opt.innerHTML = jml + " Ampul";
        selectAmpul.appendChild(opt);
    });

    // Reset field MG dan Pengencer saat ganti obat
    document.getElementById('mg').value = "";
    document.getElementById('pengencer').value = "";
}

// FUNGSI 2: Mengisi MG dan Pengencer berdasarkan jenis obat + jumlah ampul
function isiOtomatis() {
    const jenisObat = document.getElementById('obat').value;
    const jmlAmpul = parseInt(document.getElementById('jml_ampul').value);
    const fieldMg = document.getElementById('mg');
    const fieldPengencer = document.getElementById('pengencer');

    if (!jenisObat || !jmlAmpul) return;

    // Nilai MG tetap 60 sesuai permintaanmu sebelumnya
    fieldMg.value = 60;

    if (jenisObat === "epinefrin") {
        fieldPengencer.value = jmlAmpul * 20; // 1=20, 2=40, dst.
    } 
    else if (jenisObat === "norepinefrin") {
        fieldPengencer.value = jmlAmpul * 80; // 1=80, 2=160, 3=240
    } 
    else if (jenisObat === "dobutamin") {
        fieldPengencer.value = 5000;
    } 
    else if (jenisObat === "dopamin") {
        fieldPengencer.value = 4000;
    }
}

    // 2. Rumus sesuai permintaan: (dosis * bb * mg) / pengencer
    function hitungDosis() {
        const dosis = parseFloat(document.getElementById('dosis').value);
        const bb = parseFloat(document.getElementById('bb').value);
        const mg = parseFloat(document.getElementById('mg').value);
        const pengencer = parseFloat(document.getElementById('pengencer').value);

        if (dosis && bb && mg && pengencer) {
            const total = (dosis * bb * mg) / pengencer;
            document.getElementById('hasil').innerHTML = "Hasil: " + total.toFixed(2) + " cc/jam";
        } else {
            alert("Mohon pilih obat dan isi Dosis serta BB!");
        }
    }

    function resetForm() {
        document.getElementById('obat').value = "";
        document.getElementById('jml_ampul').value = "";
        document.getElementById('dosis').value = "";
        document.getElementById('bb').value = "";
        document.getElementById('mg').value = "";
        document.getElementById('pengencer').value = "";
        document.getElementById('hasil').innerHTML = "Hasil: 0 ml";
    }

    document.getElementById("year").innerHTML = new Date().getFullYear();

    function toggleFlipbook() {
    const container = document.getElementById('flipbookContainer');
    const btn = document.querySelector('.btn-toggle');
    
    if (container.style.display === "none") {
        container.style.display = "block";
        btn.innerHTML = "Tutup Panduan";
    } else {
        container.style.display = "none";
        btn.innerHTML = "Lihat Panduan (Flipbook)";
    }
}
